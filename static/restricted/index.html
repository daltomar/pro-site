<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restricted Area</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main>
    <!-- BANNER -->
    <h1>Restricted Area</h1>
    <p class="restricted-intro">
      You are in the restricted area. This section is available exclusively to
      authorized users. The content here is private and must not be shared.
    </p>
    <hr>

    <div class="tabs" role="tablist">
      <button class="tab active" data-tab="1">Über</button>
      <button class="tab" data-tab="2">Mein Setup</button>
      <button class="tab" data-tab="3">Persönlichkeit</button>
      <button class="tab" data-tab="4">Bücher</button>
    </div>

    <div class="tab-panels">
      <div class="tab-panel active" data-panel="1">
        <!-- TAB1_CONTENT -->
      </div>
      <div class="tab-panel" data-panel="2">
        <!-- TAB2_CONTENT -->
      </div>
      <div class="tab-panel" data-panel="3">
        <!-- TAB3_CONTENT -->
      </div>
      <div class="tab-panel" data-panel="4">
        <!-- TAB4_CONTENT -->
      </div>
    </div>

    <form class="logout-form" method="post" action="/logout">
      <button type="submit">Sign out</button>
    </form>
  </main>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`.tab-panel[data-panel="${tab.dataset.tab}"]`).classList.add('active');
      });
    });

    (function () {
      const INACTIVITY_TIMEOUT_MS = 10 * 60 * 1000;
      let timer = setTimeout(() => { window.location.href = '/login'; }, INACTIVITY_TIMEOUT_MS);

      function resetTimer() {
        clearTimeout(timer);
        timer = setTimeout(() => { window.location.href = '/login'; }, INACTIVITY_TIMEOUT_MS);
      }

      ['mousemove', 'keydown', 'mousedown', 'touchstart', 'scroll'].forEach(function (evt) {
        document.addEventListener(evt, resetTimer, { passive: true });
      });
    })();
  </script>
</body>
</html>
